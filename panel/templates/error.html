{% extends 'base.html' %}
{% from '_icons.html' import icon %}
{% block title %}خطا {{ code }} — پنل Aras-GP{% endblock %}

{% block body %}
<main class="ar-auth">
  <div class="ar-card ar-auth__box ar-reveal">
    <div class="ar-brand">
      <img class="ar-brand__mark" src="{{ url_for('static', filename='brand/aras-mark.svg') }}"
           alt="Aras-GP" width="58" height="58">
    </div>
    <h1 class="ar-auth__title ar-num">{{ code }}</h1>
    <p class="ar-auth__desc">{{ message }}</p>
    <a class="ar-btn ar-btn--primary ar-btn--block" href="{{ url_for('dashboard') }}">
      {{ icon('arrow', 16) }}<span>بازگشت به داشبورد</span>
    </a>
  </div>
</main>
{% endblock %}
